# These are the NIX packages required to build Python wheels for PDF/Crypto
nixPkgs = [
    "python312",
    "gcc",
    "libffi",
    "openssl",
    "zlib",
    "libjpeg",
    "freetype"
]

[phases.install]
# Ensures we use the virtual env and install requirements correctly
cmds = [
    "python -m venv --copies /opt/venv",
    ". /opt/venv/bin/activate && pip install --upgrade pip && pip install -r requirements.txt"
]