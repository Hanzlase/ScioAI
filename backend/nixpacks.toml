# Nixpacks configuration for ScioAI Backend
# This ensures system dependencies for WeasyPrint (cairo, pango, etc.) are installed and discoverable.

[phases.setup]
nixPkgs = [
    "python312",
    "gcc",
    "cairo",
    "pango",
    "gdk-pixbuf",
    "libffi",
    "glib",
    "pkg-config",
    "fontconfig",
    "freetype",
    "zlib",
    "libpng",
    "libjpeg",
    "harfbuzz"
]

[phases.install]
cmds = [
    "python -m venv --copies /opt/venv",
    ". /opt/venv/bin/activate && pip install --upgrade pip setuptools wheel",
    ". /opt/venv/bin/activate && pip install -r requirements.txt"
]

[start]
cmd = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"

[variables]
# Help pkg-config find the nix-installed libraries if they aren't in the default path
PKG_CONFIG_PATH = "/nix/var/nix/profiles/default/lib/pkgconfig"
# Ensure the dynamic linker can find the libraries at runtime
LD_LIBRARY_PATH = "/nix/var/nix/profiles/default/lib"
